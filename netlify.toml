[[plugins]]
  package = "@netlify/plugin-nextjs"

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Cache the Next.js build cache between deploys for faster builds
[[plugins]]
  package = "netlify-plugin-cache-nextjs"

# Long-lived cache for static assets (images, fonts, JS, CSS)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images served by Netlify
[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "*.avif"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
